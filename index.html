<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div class="container" id="container">
        <div class="welcomeAnimation" id="welcomeAnimation"></div>
    <div id="count" class="count">
        <div>
            All Todo number : <span id="allTodoNumber">0</span>
        </div>
        <div>
            Done Todo : <span id="doneTodo">0</span>
        </div>
        <div>
            Undone Todo : <span id="undoneTodo">0</span>
        </div>
    </div>
    <div class="search"><textarea id="search" placeholder="search here..."></textarea></div>
       <textarea id="task" placeholder="a"> 
    </textarea>
        <button id="addTodo" class="addTodo">Add Todo</button>
        <button id="Filter" class="addTodo">Filter</button>
        
        <div class="todoList" id="todoList"></div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
